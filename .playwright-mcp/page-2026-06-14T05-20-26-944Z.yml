            - heading "2. DocInfo" [level=3] [ref=e149]
            - paragraph [ref=e150]: 문서에서 사용된 글꼴, 글자 속성, 문단 속성 등 문서에서 공통으로 사용되는 정보들을 담고 있는 스트림입니다.
            - paragraph [ref=e151]: DocInfo의 정보를 확인하기 위해 헥사사 에디터로 파일을 열어보면 알아볼 수 없는 값들로 채워져 있어 당황하신 분들이 많을 것 같습니다. 이번에 설명할 DocInfo와 바로 뒤에 설명할 Section 스트림은 파일 용량을 절약하기 위해 zlib으로 압축된 상태로 저장되어 있습니다.
            - paragraph [ref=e152]:
              - text: 간단하게 한/글에서
              - strong [ref=e153]: “도구 탭 > 환경설정 > 파일 > 한글 문서(*.hwp) 압축 저장 설정”
              - text: 을 해제한 후 파일을 저장하면 압축되지 않은 상태로 문서가 저장되어 아래와 같이 원본 데이터를 확인할 수 있습니다.
            - figure [ref=e154]
            - paragraph [ref=e156]: 이제 압축되지 않은 DocInfo의 정보를 살펴보겠습니다. 저장된 정보들이 File Header처럼 단순해 보이지 않습니다. DocInfo는 File Header와 다르게 논리적으로 연관된 여러 종류의 정보가 저장되어 있어 레코드 형식으로 구성되어 있습니다. 이를 해석하기 위해선 레코드 형식에 대해 알아볼 필요가 있습니다.
