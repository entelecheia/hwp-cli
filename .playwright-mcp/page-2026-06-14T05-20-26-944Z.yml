            - heading "4. BodyText (Section)" [level=3] [ref=e308]
            - paragraph [ref=e309]: 문서의 본문에 해당하는 실제 내용이 저장됩니다. BodyText 스토리지는 본문의 구역 수에 따라 여러 개의 Section 스트림으로 구성됩니다. (예] 구역이 2개일 경우 BodyText는 Section0, Section1을 포함합니다.)
            - paragraph [ref=e310]: 이 스트림은 표의 내용이나 본문의 구성 등 실제 본문이 어떻게 이루어져 있는지 확인할 수 있습니다. 본문에서 사용되는 데이터 레코드는 종류가 다양하고 복잡하므로 다음 시간에 자세히 살펴보겠습니다.
