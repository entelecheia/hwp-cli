              - generic "요약" [ref=e57] [cursor=pointer]
              - paragraph [ref=e58]: 이 글은 HWP 포맷의 구조와 문서 정보 저장 방식을 다룹니다. HWP 포맷의 설명과 파일 구조를 중심으로, 문서 정보가 저장되고 관리되는 방식을 상세히 살펴봅니다. 마지막으로, HWPX 포맷에 대한 내용을 간단히 예고합니다.
            - heading "서론" [level=2] [ref=e60]:
              - strong [ref=e61]: 서론
            - separator [ref=e62]
            - paragraph [ref=e63]: 현대 사회에서 인공지능 기술은 다양한 분야에서 혁신을 이끌고 있으며 데이터의 중요성은 날로 증가하고 있습니다. 특히 자연어 처리와 같은 AI 응용 분야에서는 데이터가 큰 역할을 하고 있는데 이 데이터를 학습하고 가공하여 정확한 예측이 가능해지기 때문입니다.
            - paragraph [ref=e64]: 이러한 맥락에서 워드프로세서 포맷 중 하나인 HWP 포맷은 AI 학습에 있어서 장점이 될 만한 요소들을 가지고 있습니다.
            - list [ref=e65]:
              - listitem [ref=e66]: 단순한 텍스트 외에도 이미지, 표, 차트 등의 다양한 요소로 구성되어 풍부한 정보를 제공할 수 있습니다.
              - listitem [ref=e67]: 제목, 단락, 표 등의 다양한 형식으로 구조화되어 있어 AI 모델이 문서를 이해하고 분석하는데 도움이 될 수 있습니다.
            - paragraph [ref=e69]: 이번 시간에는 오랫동안 생산되고 유통되어 온 HWP 포맷의 구조에 대해 알아보고 문서의 정보들이 어떻게 녹아들어 있는지 확인해 보는 시간을 가져보겠습니다.
            - heading "HWP 포맷이란?" [level=2] [ref=e71]:
              - strong [ref=e72]: HWP 포맷이란
              - text: "?"
            - separator [ref=e73]
            - paragraph [ref=e74]:
              - text: HWP 포맷은 한글과컴퓨터에서 개발된 문서 포맷으로 한글 97 버전에서 처음 공개되었습니다. 이 포맷의 세부내용은 한동안 공개되지 않았으나, 2010년에 들어 공개되었습니다. 자세한 사항은
              - link "한글과컴퓨터 공식 홈페이지" [ref=e75] [cursor=pointer]:
                - /url: https://www.hancom.com/etc/hwpDownload.do?gnb0=269&gnb1=271&gnb0=101&gnb1=140
              - text: 에서 확인해 보실 수 있습니다.
            - paragraph [ref=e76]: 다만 포맷에 대한 기본 지식이 없다면 이해하기 어려울 수 있습니다. 그래서 이 블로그 글을 통해 조금 더 쉽게 설명해 드리겠습니다.
            - paragraph [ref=e77]:
              - text: HWP 포맷은 바이너리 형식으로 마이크로소프트에서 개발한
              - link "CFB(Compound File Binary File Format, 이하 CFB)" [ref=e78] [cursor=pointer]:
                - /url: https://learn.microsoft.com/en-us/openspecs/windows_protocols/ms-cfb/53989ce4-7b05-4f8d-829b-d08d6148375b
              - text: 으로 구성되어 있습니다. 이 포맷은 여러 데이터 스트림을 단일 파일 안에 저장하기 위한 방식으로 FAT(File Allocation Table)와 유사합니다. 간단히 말해 파일 내부에 폴더 구조가 포함된 포맷이라고 이해하시면 됩니다.
            - paragraph [ref=e79]: HWP 파일 내부에는 다음과 같은 정보들이 포함되어 있습니다.
            - list [ref=e80]:
              - listitem [ref=e81]: File Header
              - listitem [ref=e82]: DocInfo
              - listitem [ref=e83]: DocOptions
              - listitem [ref=e84]: BodyText
              - listitem [ref=e85]: Script
              - listitem [ref=e86]: "|HwpSummaryInformation"
              - listitem [ref=e87]: PrvImage
              - listitem [ref=e88]: PrvText
            - paragraph [ref=e90]: 이러한 구성요소들은 파일 구조를 통해 효율적으로 관리되고 간단하게 그림으로 표현하면 아래와 같습니다.
            - figure [ref=e91]
            - heading "1. File Header" [level=3] [ref=e93]
            - paragraph [ref=e94]:
              - text: 간혹 CFB의 헤더 정보와 HWP의 파일 헤더 정보를 혼동하시는 분들이 계십니다.
              - text: HWP 파일은 CFB로 구성되어 있어서 파일 최상단부에 나타나는 정보는 Compound File Header 정보입니다. 이는 CFB를 구성하기 위한 정보입니다.
            - figure "Compound File Header" [ref=e95]:
              - generic [ref=e96]: Compound File Header
            - paragraph [ref=e98]:
              - text: 반면 HWP 포맷에서 사용하는 파일 헤더에는 한글 문서에서 사용하는 포맷 정보가 포함되어 있습니다.
              - text: 따라서 두 헤더 정보는 서로 다른 목적과 내용을 가지고 있어 구분하는 것이 중요합니다.
            - figure "Hwp File Header" [ref=e99]:
              - generic [ref=e100]: Hwp File Header
            - paragraph [ref=e102]: HWP 포맷의 파일 헤더에는 다양한 정보가 저장되어 있습니다. 위 이미지에서 확인할 수 있듯이 파일 헤더에는 한글 문서 인식 정보가 포함되어 있습니다. 이 정보는 서명 정보부터 시작해서 문서 버전, 파일 인식 정보들로 구성됩니다. 이러한 정보들을 통해 한/글은 HWP 파일이 어떤 문서인지 판단해서 처리하고 있습니다.
