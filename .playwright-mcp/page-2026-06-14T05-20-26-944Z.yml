            - paragraph [ref=e138]: 위 표에 따라 파일 헤더를 해석해보면
            - figure [ref=e139]
            - paragraph [ref=e141]: 32바이트 영역에 서명정보가 포함되어 있습니다.
            - figure [ref=e142]
